<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduSync — Upgraded Basic Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--primary:#0f4c75;--primary-light:#1b6ca8;--primary-pale:#e8f4fd;--accent:#f7b731;--accent2:#20bf6b;--danger:#eb3b5a;--warning:#fa8231;--purple:#8854d0;--teal:#00b8a9;--bg:#f0f4f8;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;--text:#1a202c;--text2:#4a5568;--text3:#718096;--sidebar-w:256px;--header-h:62px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);--shadow-lg:0 8px 32px rgba(0,0,0,.14);--r:12px;--rsm:8px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}button{font-family:'Sora',sans-serif;cursor:pointer}
input,select,textarea{font-family:'Sora',sans-serif}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* AUTH */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f4c75 0%,#1b6ca8 50%,#0a3251 100%);padding:20px;position:relative;overflow:hidden}
.auth-page::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(247,183,49,.12) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(32,191,107,.08) 0%,transparent 50%)}
.auth-card{background:#fff;border-radius:22px;padding:42px 38px;width:100%;max-width:440px;position:relative;z-index:1;box-shadow:0 32px 80px rgba(0,0,0,.3);animation:slideUp .4s ease}
.auth-logo{display:flex;align-items:center;gap:11px;margin-bottom:28px}
.auth-logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.auth-logo-text{font-size:23px;font-weight:800;color:var(--primary)}.auth-logo-text span{color:var(--accent)}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:20px}
.role-btn{padding:12px 8px;border:2px solid var(--border);border-radius:10px;cursor:pointer;text-align:center;transition:all .18s;background:var(--surface2)}
.role-btn:hover{border-color:var(--primary-light);background:var(--primary-pale)}
.role-btn.active{border-color:var(--primary);background:var(--primary-pale)}
.role-btn .ri{font-size:22px;margin-bottom:4px}.role-btn .rn{font-size:11px;font-weight:600;color:var(--text2)}
.role-btn.active .rn{color:var(--primary)}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 13px;border:2px solid var(--border);border-radius:var(--rsm);font-size:13px;color:var(--text);background:var(--surface2);transition:all .2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(15,76,117,.07)}
.form-label{display:block;font-size:11.5px;font-weight:600;color:var(--text2);margin-bottom:5px}
.form-row{margin-bottom:14px}
.btn-auth{width:100%;padding:13px;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(15,76,117,.3)}
.btn-auth:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(15,76,117,.4)}
.auth-demo{margin-top:16px;text-align:center;font-size:12px;color:var(--text3)}.auth-demo strong{color:var(--primary);cursor:pointer}

/* LAYOUT */
.app-shell{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--primary);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100;box-shadow:4px 0 24px rgba(0,0,0,.15)}
.sidebar-logo{padding:18px 22px;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo-icon{width:38px;height:38px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px}
.sidebar-logo-text{font-size:19px;font-weight:800;color:#fff;letter-spacing:-.5px}.sidebar-logo-text span{color:var(--accent)}
.sidebar-school{padding:12px 22px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-school-name{font-size:12.5px;font-weight:600;color:rgba(255,255,255,.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-plan-badge{font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);background:rgba(247,183,49,.15);padding:2px 8px;border-radius:20px;display:inline-block;margin-top:4px}
.sidebar-nav{flex:1;overflow-y:auto;padding:10px 0}
.nav-section-label{padding:8px 22px 3px;font-size:9.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.35)}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px 9px 22px;cursor:pointer;color:rgba(255,255,255,.7);font-size:13px;font-weight:500;position:relative;margin:1px 10px;border-radius:9px;transition:all .15s}
.nav-item:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-item.active{background:rgba(255,255,255,.16);color:#fff;font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:4px;height:55%;background:var(--accent);border-radius:4px}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--accent);color:var(--primary);font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.nav-badge-new{margin-left:auto;background:var(--accent2);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px}
.sidebar-footer{padding:14px 22px;border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:11px}
.user-avatar{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.user-info{flex:1;min-width:0}.user-name{font-size:12.5px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:10.5px;color:rgba(255,255,255,.45);text-transform:capitalize}
.logout-btn{background:none;border:none;color:rgba(255,255,255,.4);padding:4px;font-size:17px;transition:color .2s}
.logout-btn:hover{color:#fff}
.main-area{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:var(--header-h);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:14px;position:sticky;top:0;z-index:50;box-shadow:0 1px 8px rgba(0,0,0,.05)}
.topbar-title{font-size:18px;font-weight:700;flex:1}
.topbar-date{font-size:12px;color:var(--text3);white-space:nowrap}
.notif-btn{width:36px;height:36px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;position:relative;transition:background .2s;border:none}
.notif-btn:hover{background:var(--border)}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:var(--danger);border-radius:50%;border:2px solid #fff}
.page-content{padding:24px 28px;flex:1}

/* CARDS & STATS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat-bg{position:absolute;right:-12px;top:-12px;width:66px;height:66px;border-radius:50%;opacity:.09}
.stat-icon{font-size:22px;margin-bottom:9px}.stat-label{font-size:10.5px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.stat-value{font-size:26px;font-weight:800;line-height:1;margin-bottom:4px}
.stat-sub{font-size:11px;color:var(--text3)}.stat-sub.up{color:var(--accent2)}.stat-sub.down{color:var(--danger)}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
.card-title{font-size:14.5px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rsm);font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;border:none}
.btn-sm{padding:5px 12px;font-size:11.5px}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(15,76,117,.22)}
.btn-primary:hover{background:var(--primary-light);transform:translateY(-1px)}
.btn-green{background:var(--accent2);color:#fff}.btn-green:hover{background:#1aaa5e}
.btn-yellow{background:var(--accent);color:var(--primary)}
.btn-danger{background:var(--danger);color:#fff}
.btn-teal{background:var(--teal);color:#fff}
.btn-purple{background:var(--purple);color:#fff}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-wa{background:#25d366;color:#fff;border:none}
.btn-wa:hover{background:#1da851}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}
.badge-green{background:#d4edda;color:#155724}.badge-red{background:#f8d7da;color:#721c24}
.badge-yellow{background:#fff3cd;color:#856404}.badge-blue{background:#cce5ff;color:#004085}
.badge-purple{background:#e9d8fd;color:#553c9a}.badge-gray{background:#e2e8f0;color:#4a5568}
.badge-orange{background:#fde8d8;color:#7b341e}.badge-teal{background:#d0f4f2;color:#0a5955}

/* TABLE */
.table-wrap{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
.table-header{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:9px}
.table-title{font-size:14px;font-weight:700}
.table-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
table{width:100%;border-collapse:collapse}
th{padding:9px 16px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);background:var(--surface2);border-bottom:1px solid var(--border)}
td{padding:11px 16px;font-size:13px;color:var(--text2);border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--surface2)}

/* PROGRESS */
.progress-bar{height:7px;background:var(--border);border-radius:20px;overflow:hidden}
.progress-fill{height:100%;border-radius:20px;transition:width .5s ease}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.modal{background:#fff;border-radius:18px;padding:28px;width:100%;max-width:500px;box-shadow:var(--shadow-lg);animation:slideUp .25s ease;max-height:90vh;overflow-y:auto}
.modal-wide{max-width:660px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px}
.modal-actions{display:flex;gap:9px;margin-top:18px;justify-content:flex-end}

/* TOAST */
.toast-container{position:fixed;top:16px;right:16px;z-index:300;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--text);color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);animation:toastIn .3s ease;display:flex;align-items:center;gap:9px;min-width:250px}
.toast.success{background:#155724;border-left:4px solid var(--accent2)}
.toast.error{background:#721c24;border-left:4px solid var(--danger)}
.toast.info{background:var(--primary);border-left:4px solid var(--accent)}
.toast.wa{background:#075e54;border-left:4px solid #25d366}

/* SEARCH */
.search-wrap{position:relative}.search-wrap .form-input{padding-left:34px}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:14px}

/* ATTENDANCE */
.att-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px}
.att-card{background:#fff;border-radius:10px;padding:12px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:7px}
.att-name{font-size:12px;font-weight:600}.att-roll{font-size:10.5px;color:var(--text3)}
.att-btns{display:flex;gap:5px}
.att-btn{flex:1;padding:5px 2px;border-radius:6px;border:2px solid var(--border);font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;background:#fff;color:var(--text2)}
.att-btn.present{border-color:var(--accent2);background:#d4edda;color:#155724}
.att-btn.absent{border-color:var(--danger);background:#f8d7da;color:#721c24}
.att-btn.late{border-color:var(--warning);background:#fff3cd;color:#856404}

/* BIRTHDAY BANNER */
.birthday-banner{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:var(--r);padding:20px;color:#fff;margin-bottom:18px;position:relative;overflow:hidden}
.birthday-banner::after{content:'🎉';position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:60px;opacity:.14}
.birthday-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px}
.birthday-chip{background:rgba(255,255,255,.18);border-radius:9px;padding:6px 12px;backdrop-filter:blur(8px)}
.birthday-chip-name{font-size:12.5px;font-weight:600}.birthday-chip-class{font-size:10.5px;opacity:.7}

/* WA MESSAGE */
.wa-preview{background:#e8f8ef;border-radius:10px;padding:14px;margin-top:10px;border-left:4px solid #25d366;position:relative}
.wa-preview::before{content:'WhatsApp Preview';position:absolute;top:-8px;left:12px;background:#25d366;color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.5px}
.wa-msg{font-size:12.5px;color:#075e54;line-height:1.7;white-space:pre-wrap;font-family:monospace}

/* FEE */
.fee-stat{background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:var(--r);padding:20px;color:#fff;margin-bottom:16px}

/* ANALYTICS */
.chart-container{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
.mini-chart{display:flex;align-items:flex-end;gap:4px;height:60px}
.mini-bar{flex:1;border-radius:4px 4px 0 0;background:var(--primary);opacity:.7;transition:height .3s}
.mini-bar:hover{opacity:1}

/* CALENDAR */
.cal-wrap{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:20px}
.cal-grid-wrap{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-name{text-align:center;font-size:10px;font-weight:700;color:var(--text3);padding:6px 0}
.cal-day{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:500;position:relative;cursor:default}
.cal-day.today{background:var(--primary);color:#fff;font-weight:700}
.cal-day.present::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent2)}
.cal-day.absent::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--danger)}
.cal-day.holiday{background:#fff3cd;color:#856404}
.cal-day.other-month{color:var(--border)}

/* ANN / PTM / COMPLAINT */
.ann-card{background:#fff;border-radius:var(--r);padding:15px 17px;box-shadow:var(--shadow);margin-bottom:8px;border-left:4px solid var(--primary);transition:transform .18s}
.ann-card:hover{transform:translateX(3px)}.ann-card.important{border-left-color:var(--accent)}
.ptm-card{background:#fff;border-radius:var(--r);padding:15px 17px;box-shadow:var(--shadow);margin-bottom:8px;display:flex;align-items:center;gap:13px}
.complaint-card{background:#fff;border-radius:var(--r);padding:15px 17px;box-shadow:var(--shadow);margin-bottom:8px}

/* NEW FEATURE CARDS */
.feature-highlight{background:linear-gradient(135deg,rgba(15,76,117,.05),rgba(247,183,49,.05));border:2px solid var(--accent);border-radius:var(--r);padding:18px;margin-bottom:14px}
.wa-integration-card{background:linear-gradient(135deg,#075e54,#128c7e);border-radius:var(--r);padding:20px;color:#fff;margin-bottom:16px}
.analytics-ring{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;flex-shrink:0}

/* ALERT BOX */
.alert{padding:12px 16px;border-radius:var(--rsm);margin-bottom:12px;font-size:13px;display:flex;align-items:flex-start;gap:10px}
.alert-warning{background:#fff3cd;border-left:4px solid var(--warning);color:#856404}
.alert-danger{background:#f8d7da;border-left:4px solid var(--danger);color:#721c24}
.alert-success{background:#d4edda;border-left:4px solid var(--accent2);color:#155724}
.alert-info{background:#cce5ff;border-left:4px solid var(--primary);color:#004085}

/* TABS */
.tabs{display:flex;gap:3px;background:var(--bg);border-radius:9px;padding:3px;margin-bottom:16px;width:fit-content}
.tab{padding:7px 16px;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--text3);transition:all .2s;border:none;background:none;font-family:'Sora',sans-serif}
.tab.active{background:#fff;color:var(--primary);box-shadow:var(--shadow)}

/* SCHOOL-ROW */
.school-row-logo{width:32px;height:32px;border-radius:7px;background:var(--primary-pale);display:flex;align-items:center;justify-content:center;font-size:16px}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- ══════════ AUTH ══════════ -->
<div id="authScreen">
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🎓</div>
      <div class="auth-logo-text">Edu<span>Sync</span></div>
    </div>
    <div style="font-size:23px;font-weight:700;margin-bottom:4px">Welcome back</div>
    <div style="color:var(--text3);font-size:13px;margin-bottom:24px">Sign in to your school dashboard</div>
    <div class="form-row">
      <label class="form-label">SELECT YOUR ROLE</label>
      <div class="role-grid" id="roleGrid">
        <div class="role-btn active" onclick="selectRole(this,'superadmin')"><div class="ri">🛡️</div><div class="rn">Super Admin</div></div>
        <div class="role-btn" onclick="selectRole(this,'admin')"><div class="ri">👨‍💼</div><div class="rn">Admin</div></div>
        <div class="role-btn" onclick="selectRole(this,'teacher')"><div class="ri">👨‍🏫</div><div class="rn">Teacher</div></div>
        <div class="role-btn" onclick="selectRole(this,'parent')"><div class="ri">👨‍👩‍👦</div><div class="rn">Parent</div></div>
        <div class="role-btn" onclick="selectRole(this,'student')"><div class="ri">👦</div><div class="rn">Student</div></div>
      </div>
    </div>
    <div class="form-row"><label class="form-label">EMAIL</label><input class="form-input" type="email" value="admin@stmarys.edu"/></div>
    <div class="form-row"><label class="form-label">PASSWORD</label><input class="form-input" type="password" value="demo1234"/></div>
    <button class="btn-auth" onclick="doLogin()">Sign In to Dashboard →</button>
    <div class="auth-demo">Demo Mode — <strong onclick="doLogin()">Click Sign In</strong> to explore all features</div>
  </div>
</div>
</div>

<!-- ══════════ APP SHELL ══════════ -->
<div id="appShell" class="hidden">
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🎓</div>
      <div class="sidebar-logo-text">Edu<span>Sync</span></div>
    </div>
    <div class="sidebar-school">
      <div class="sidebar-school-name" id="schoolName">St. Mary's School</div>
      <div class="sidebar-plan-badge">Basic Plan ⚡ Upgraded</div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="user-avatar" id="userAvatar">👨‍💼</div>

function initApp(){
  const u=USERS_MAP[currentRole]
  document.getElementById('userAvatar').textContent=u.avatar
  document.getElementById('userName').textContent=u.name
  document.getElementById('userRoleLabel').textContent=u.role
  document.getElementById('topbarDate').textContent=new Date().toLocaleDateString('en-IN',{weekday:'short',year:'numeric',month:'short',day:'numeric'})
  buildNav(); navigateTo('dashboard')
}

function buildNav(){
  const nav=document.getElementById('sidebarNav')
  nav.innerHTML=''
  ;(NAVS[currentRole]||[]).forEach(item=>{
    if(item.section){nav.innerHTML+=`<div class="nav-section-label">${item.section}</div>`;return}
    const badge=item.badge==='NEW'?`<span class="nav-badge-new">NEW</span>`:item.badge?`<span class="nav-badge">${item.badge}</span>`:''
    nav.innerHTML+=`<div class="nav-item" id="nav-${item.id}" onclick="navigateTo('${item.id}')"><span class="nav-icon">${item.icon}</span><span>${item.label}</span>${badge}</div>`
  })
}

function navigateTo(page){
  currentPage=page
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'))
  const el=document.getElementById(`nav-${page}`)
  if(el)el.classList.add('active')
  const titles={dashboard:'Dashboard',students:'Students',teachers:'Teachers',whatsapp:'WhatsApp Alerts',fees:'Fee Management',analytics:'Analytics Dashboard',attendance:'Attendance',homework:'Homework',marksheet:'Marksheet',timetable:'Timetable',announcements:'Announcements',ptm:'Parent-Teacher Meeting',complaints:'Complaints',holidays:'Holidays',birthdays:'Birthdays',gallery:'Photo Gallery',idcard:'ID Cards',schools:'All Schools',revenue:'Revenue & MRR',users:'All Users',plans:'Plan Management',support:'Support Tickets'}
  document.getElementById('topbarTitle').textContent=titles[page]||page
  const content=document.getElementById('mainContent')
  const PAGES={
    dashboard:renderDashboard,students:renderStudents,teachers:renderTeachers,
    whatsapp:renderWhatsApp,fees:renderFees,analytics:renderAnalytics,
    attendance:renderAttendance,homework:renderHomework,marksheet:renderMarksheet,
    timetable:renderTimetable,announcements:renderAnnouncements,ptm:renderPTM,
    complaints:renderComplaints,holidays:renderHolidays,birthdays:renderBirthdays,
    gallery:renderGallery,idcard:renderIDCard,
    schools:renderSchools,revenue:renderRevenue,users:renderUsers,plans:renderPlans,support:renderSupport
  }
  content.innerHTML=(PAGES[page]||renderDashboard)()
}

function renderAttCalendar(){
  const child=DEMO.students[0],today=new Date(),year=today.getFullYear(),month=today.getMonth()

  return `
  <div class="two-col" style="margin-bottom:16px">
    <div class="card" style="margin:0;text-align:center"><div style="font-size:32px;font-weight:800;color:var(--accent2)">${child.attendance}%</div><div style="font-size:12px;color:var(--text3)">Overall Attendance</div></div>
    <div class="card" style="margin:0;text-align:center"><div style="font-size:32px;font-weight:800;color:var(--danger)">3</div><div style="font-size:12px;color:var(--text3)">Absent This Month</div></div>
  </div>
  <div class="cal-wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="font-weight:700">${today.toLocaleString('default',{month:'long'})} ${year}</div>
      <div style="display:flex;gap:12px;font-size:11px;align-items:center">
        <span style="display:flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:50%;background:var(--accent2);display:inline-block"></span>Present</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:50%;background:var(--danger);display:inline-block"></span>Absent</span>
      </div>
    </div>
    <div class="cal-grid-wrap">
      ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-day-name">${d}</div>`).join('')}
      ${Array.from({length:firstDay}).map((_,i)=>`<div class="cal-day other-month"></div>`).join('')}
      ${Array.from({length:daysInMonth}).map((_,i)=>{const d=i+1,isToday=d===today.getDate(),isWk=(firstDay+d-1)%7===0||(firstDay+d-1)%7===6,st=d%3===0?'absent':d%7===0?'':'present';return`<div class="cal-day ${isToday?'today':''} ${!isToday&&!isWk?st:''}">${d}</div>`}).join('')}
    </div>
  </div>`
}

function markAtt(roll,status,el){

  card.querySelectorAll('.att-btn').forEach(b=>b.classList.remove('present','absent','late'))

  DEMO.att[roll]={status}
}

function renderBirthdays(){

      return`<tr><td><strong>${s.name}</strong></td><td>${s.class}</td><td>${d.toLocaleDateString('en-IN',{day:'numeric',month:'long'})}</td><td>${badge(days===0?'Today!':days+' days',days===0?'yellow':days<=7?'blue':'gray')}</td><td><div style="display:flex;gap:6px"><button class="btn btn-sm btn-yellow" onclick="toast('Birthday wish sent to ${s.name}! 🎂','success')">🎉 Wish</button><button class="btn btn-sm btn-wa" onclick="toast('WhatsApp birthday wish sent to ${s.parent}! 📲','wa')">📲 WhatsApp</button></div></td></tr>`

function showModal(content){
  document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal modal-wide">${content}</div></div>`
}
function closeModal(){document.getElementById('modalContainer').innerHTML=''}

function toast(msg,type='info'){
  const icons={success:'✅',error:'❌',info:'ℹ️',wa:'💬'}
  const wrap=document.getElementById('toastRoot')
  const id='t'+Date.now()
  wrap.innerHTML+=`<div class="toast ${type}" id="${id}">${icons[type]||'ℹ️'} ${msg}</div>`
  setTimeout(()=>{const el=document.getElementById(id);if(el)el.remove()},3500)
}
